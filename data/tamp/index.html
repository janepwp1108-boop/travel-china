            const gridContainer = document.getElementById('souvenir-grid-container');
            gridContainer.innerHTML = ""; 

            souvenirData.forEach(item => {
                const cardHtml = `
                    <div class="souvenir-card">
                        <div class="image-container">
                            <img src="${item.imageUrl}" alt="${item.name}">
                        </div>
                        <div class="content-container">
                            <h2>${item.name}</h2>
                            <p>${item.description}</p>
                            <div class="meta-zone">
                                <span class="category-label">หมวดหมู่:</span>
                                <span class="category-value">${item.category}</span>
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.innerHTML += cardHtml;
            });
